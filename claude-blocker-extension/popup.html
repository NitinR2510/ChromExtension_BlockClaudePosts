<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      padding: 24px 20px;
    }

    .icon { font-size: 32px; text-align: center; margin-bottom: 10px; }

    h1 {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 10px;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.4);
      text-align: center;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #e94560, transparent);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .status {
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .status strong {
      color: #e94560;
    }

    .footer {
      margin-top: 16px;
      font-size: 9px;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.2);
      text-align: center;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="icon">🙈</div>
  <h1>Claude Blocker</h1>
  <p class="sub">for LinkedIn</p>
  <div class="divider"></div>
  <div class="status">
    Active on <strong>linkedin.com</strong>.<br><br>
    Any post mentioning <strong>Claude</strong> will be replaced with a random fun fact.<br><br>
    Scroll freely. 🎉
  </div>
  <p class="footer">facts via uselessfacts.jsph.pl</p>
</body>
</html>
